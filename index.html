<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0math v2 — Hardened Lab Environment</title>
  <style>
    /* ==========================================================================
       CORE MATHEMATICAL MATRIX CONFIGURATION (:root)
       ========================================================================== */
    :root {
      /* Base Scalar Multiplier (Altered via Live Play Engine) */
      --math-scalar: 1;

      /* Layer 1 — Fibonacci Matrix: Micro-Spacing (Base Scaled) */
      --fib-1: calc(1px * var(--math-scalar));
      --fib-2: calc(2px * var(--math-scalar));
      --fib-3: calc(3px * var(--math-scalar));
      --fib-5: calc(5px * var(--math-scalar));
      --fib-8: calc(8px * var(--math-scalar));
      --fib-13: calc(13px * var(--math-scalar));
      --fib-21: calc(21px * var(--math-scalar));
      --fib-34: calc(34px * var(--math-scalar));
      --fib-55: calc(55px * var(--math-scalar));
      --fib-89: calc(89px * var(--math-scalar));
      --fib-144: calc(144px * var(--math-scalar));

      /* Layer 2 — Lucas Matrix: High Fidelity Temporal Durations */
      --lucas-ms-1: 10ms;   --lucas-ms-2: 20ms;   --lucas-ms-3: 30ms;
      --lucas-ms-4: 40ms;   --lucas-ms-7: 70ms;   --lucas-ms-11: 110ms;
      --lucas-ms-18: 180ms; --lucas-ms-29: 290ms; --lucas-ms-47: 470ms;
      --lucas-ms-76: 760ms;

      /* Layer 3 — Tribonacci Matrix: Structural Component Boundary Thresholds */
      --trib-1: 1px;        --trib-2: 2px;        --trib-4: 4px;
      --trib-7: 7px;        --trib-13: 13px;      --trib-24: 24px;
      --trib-44: 44px;      --trib-81: 81px;      --trib-149: 149px;
      --trib-274: 274px;    --trib-504: 504px;

      /* Layer 4 — Padovan Matrix: Typographic Micro-Scale */
      --pad-xs: 9px;   --pad-sm: 12px;  --pad-base: 16px; --pad-md: 21px;
      --pad-lg: 28px;  --pad-xl: 37px;  --pad-2xl: 49px;  --pad-3xl: 65px;
      
      --ls-tight: -0.02em; --ls-normal: 0em; --ls-wide: 0.04em;
      --ls-wider: 0.07em;  --ls-widest: 0.12em;

      /* Layer 5 — Pell Matrix: Macro Viewport System Sizing */
      --pell-5: 5vh;    --pell-12: 12vh;   --pell-29: 29vh;
      --pell-70: 70vh;  --pell-100: 100vh;
      --pell-px-169: 169px; --pell-px-408: 408px;

      /* Visual Aesthetics Spec Map */
      --bg-dark-absolute: #050507;
      --bg-surface-flat: #0c0c10;
      --bg-surface-raised: #14141a;
      --border-hardened: #1f1f29;
      --border-interactive: #3b3b4f;
      
      --glow-primary: #5850ec;
      --glow-accent: #059669;
      --text-high-contrast: #ffffff;
      --text-mid-contrast: #9ca3af;
      --text-low-contrast: #4b5563;
    }

    /* ==========================================================================
       CSS RESET & BASE LAB ARCHITECTURE
       ========================================================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark-absolute);
      color: var(--text-mid-contrast);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: var(--pad-base);
      letter-spacing: var(--ls-normal);
      overflow: hidden;
      height: var(--pell-100);
      display: grid;
      grid-template-columns: var(--pell-px-169) 1fr var(--pell-px-408);
    }

    /* Typography Scaled via Padovan */
    h1, h2, h3, h4 { color: var(--text-high-contrast); font-weight: 700; }
    h1 { font-size: var(--pad-3xl); letter-spacing: var(--ls-tight); }
    h2 { font-size: var(--pad-2xl); letter-spacing: var(--ls-tight); }
    h3 { font-size: var(--pad-xl);  letter-spacing: var(--ls-normal); }
    h4 { font-size: var(--pad-lg);  letter-spacing: var(--ls-wide); }

    /* ==========================================================================
       SIDEBAR & CONTROL HUB NAVIGATION
       ========================================================================== */
    #sidebar-left {
      background-color: var(--bg-surface-flat);
      border-right: 1px solid var(--border-hardened);
      padding: var(--fib-34) var(--fib-13);
      display: flex;
      flex-direction: column;
      gap: var(--fib-55);
    }

    .lab-tag {
      font-size: var(--pad-sm);
      color: var(--text-high-contrast);
      font-weight: 900;
      letter-spacing: var(--ls-widest);
      text-transform: uppercase;
      border-bottom: 2px solid var(--glow-primary);
      padding-bottom: var(--fib-8);
    }

    .nav-stack {
      display: flex;
      flex-direction: column;
      gap: var(--fib-8);
      list-style: none;
    }

    .nav-stack a {
      color: var(--text-low-contrast);
      text-decoration: none;
      font-size: var(--pad-sm);
      padding: var(--fib-13);
      border-radius: var(--fib-3);
      transition: all var(--lucas-ms-18) cubic-bezier(0.19, 1, 0.22, 1);
      display: block;
      border: 1px solid transparent;
    }

    .nav-stack a:hover {
      color: var(--text-high-contrast);
      background: var(--bg-surface-raised);
    }

    .nav-stack .active-route a {
      color: var(--text-high-contrast);
      background: var(--bg-surface-raised);
      border-color: var(--border-interactive);
      box-shadow: inset 3px 0 0 var(--glow-primary);
    }

    /* ==========================================================================
       TELEMETRY PANEL (RIGHT HUD)
       ========================================================================== */
    #sidebar-right-hud {
      background-color: var(--bg-surface-flat);
      border-left: 1px solid var(--border-hardened);
      padding: var(--fib-21);
      display: flex;
      flex-direction: column;
      gap: var(--fib-34);
    }

    .hud-card {
      background: var(--bg-surface-raised);
      border: 1px solid var(--border-hardened);
      padding: var(--fib-13);
      border-radius: var(--fib-5);
    }

    .hud-metric {
      font-size: var(--pad-xl);
      color: var(--glow-accent);
      font-weight: bold;
      margin-top: var(--fib-5);
    }

    /* Live Scale Playground Input Controls */
    .slider-control {
      width: 100%;
      margin-top: var(--fib-13);
      accent-color: var(--glow-primary);
    }

    /* ==========================================================================
       CORE VIEWPORT STAGE ENGINE
       ========================================================================== */
    #stage-container {
      padding: var(--fib-55);
      overflow-y: auto;
      position: relative;
      container-type: inline-size;
    }

    .stage-wrapper {
      opacity: 0;
      transform: translateY(var(--fib-13));
      transition: opacity var(--lucas-ms-29) ease, transform var(--lucas-ms-29) ease;
    }

    .stage-wrapper.mounted {
      opacity: 1;
      transform: translateY(0);
    }

    /* ==========================================================================
       COMPLEX RESPONSIVE COMPONENTS (HARDENED UI/UX STRAT)
       ========================================================================== */
    .matrix-bento-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(var(--trib-274), 1fr));
      gap: var(--fib-21);
      margin-top: var(--fib-34);
    }

    /* Container Queries for advanced component adaptability */
    @container (min-width: 700px) {
      .wide-bento-item {
        grid-column: span 2;
      }
    }

    .interactive-node {
      background: var(--bg-surface-flat);
      border: 1px solid var(--border-hardened);
      border-radius: var(--fib-8);
      padding: var(--fib-34);
      position: relative;
      transition: border-color var(--lucas-ms-11) linear;
    }

    .interactive-node:hover {
      border-color: var(--border-interactive);
    }

    .interactive-node::before {
      content: ''; position: absolute; top: 0; left: 0; width: var(--fib-3); height: 100%;
      background: var(--glow-primary); opacity: 0; transition: opacity var(--lucas-ms-18) ease;
    }

    .interactive-node:hover::before { opacity: 1; }

    /* Custom CSS Hardware Acceleration Bar Plots */
    .graph-rail {
      background: var(--bg-dark-absolute);
      height: var(--fib-21);
      border-radius: var(--fib-3);
      overflow: hidden;
      margin-top: var(--fib-13);
    }

    .graph-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--glow-primary), var(--glow-accent));
      transition: width var(--lucas-ms-76) cubic-bezier(0.1, 0.9, 0.2, 1);
    }

    /* Async Loading Indicator Component */
    .matrix-spinner {
      width: var(--trib-44); height: var(--trib-44);
      border: var(--fib-3) solid var(--border-hardened);
      border-top-color: var(--glow-primary);
      border-radius: 50%;
      animation: spin var(--lucas-ms-76) linear infinite;
      position: absolute; top: 50%; left: 50%; margin: calc(-1 * var(--trib-24)) 0 0 calc(-1 * var(--trib-24));
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <aside id="sidebar-left">
    <div class="lab-tag">FUTELLAB // 0M</div>
    <ul class="nav-stack">
      <li data-route="blueprint"><a href="#blueprint">01 // Matrix Spec</a></li>
      <li data-route="analytics"><a href="#analytics">02 // Vector Grid</a></li>
      <li data-route="motion"><a href="#motion">03 // Quantum Delay</a></li>
    </ul>
  </aside>

  <main id="stage-container">
    <div id="router-target"></div>
  </main>

  <aside id="sidebar-right-hud">
    <div class="hud-card">
      <p style="font-size: var(--pad-sm); color: var(--text-low-contrast);">SYSTEM ROUTER LIFECYCLE</p>
      <div id="hud-lifecycle-log" style="font-size: var(--pad-xs); margin-top: var(--fib-5); color: var(--text-high-contrast);">INIT: Awaiting Step...</div>
    </div>

    <div class="hud-card">
      <p style="font-size: var(--pad-sm); color: var(--text-low-contrast);">RENDER PIPELINE EFFICIENCY</p>
      <div class="hud-metric" id="fps-display">-- FPS</div>
      <p style="font-size: var(--pad-xs); color: var(--text-low-contrast); margin-top: var(--fib-3);">Target Stability: 60FPS</p>
    </div>

    <div class="hud-card">
      <p style="font-size: var(--pad-sm); color: var(--text-low-contrast);">SYSTEM MATRIX SCALAR PLAYGROUND</p>
      <input type="range" min="0.5" max="2" step="0.1" value="1" class="slider-control" id="scalar-engine">
      <div style="display: flex; justify-content: space-between; font-size: var(--pad-xs); margin-top: var(--fib-8);">
        <span>MIN: 0.5x</span>
        <span id="scalar-value" style="color: var(--glow-primary); font-weight: bold;">1.0x</span>
        <span>MAX: 2.0x</span>
      </div>
    </div>
  </aside>

  <template id="view-blueprint">
    <div class="stage-wrapper">
      <h2>Mathematical Design Matrix Specification</h2>
      <p style="margin-top: var(--fib-8); font-size: var(--pad-sm);">Dynamic execution tracking via layout structural bindings.</p>
      
      <div class="matrix-bento-grid">
        <div class="interactive-node wide-bento-item">
          <h4>Fibonacci Micro-Paddings Array</h4>
          <p style="font-size: var(--pad-sm); margin-top: var(--fib-8);">Simulating automated mathematical layout flow mechanics down to layout roots.</p>
          <div class="graph-rail"><div class="graph-fill" data-gauge="100%"></div></div>
        </div>
        <div class="interactive-node">
          <h4>Padovan Typographic Target Step</h4>
          <p style="font-size: var(--pad-sm); margin-top: var(--fib-8);">Non-harmonic modular typographic allocation structures.</p>
          <div class="graph-rail"><div class="graph-fill" data-gauge="65%"></div></div>
        </div>
        <div class="interactive-node">
          <h4>Pell Viewport Control Scaling</h4>
          <p style="font-size: var(--pad-sm); margin-top: var(--fib-8);">Silver ratio bounding box structures matching device constraints.</p>
          <div class="graph-rail"><div class="graph-fill" data-gauge="45%"></div></div>
        </div>
      </div>
    </div>
  </template>

  <template id="view-analytics">
    <div class="stage-wrapper">
      <h2>Reactive Data Vector Grids</h2>
      <p style="margin-top: var(--fib-8); font-size: var(--pad-sm);">Dynamic calculations executing calculations live via CSS properties.</p>
      
      <div class="matrix-bento-grid">
        <div class="interactive-node">
          <span style="font-size: var(--pad-xs); color: var(--glow-accent);">NODE STATE 01</span>
          <h3 style="margin-top: var(--fib-13)">$trib-274</h3>
          <p style="font-size: var(--pad-sm); color: var(--text-low-contrast); margin-top: var(--fib-5);">Minimum safe spatial box resolution metric limit block.</p>
        </div>
        <div class="interactive-node">
          <span style="font-size: var(--pad-xs); color: var(--glow-accent);">NODE STATE 02</span>
          <h3 style="margin-top: var(--fib-13)">$pell-px-408</h3>
          <p style="font-size: var(--pad-sm); color: var(--text-low-contrast); margin-top: var(--fib-5);">Maximum interface slide out modular control layout limit boundary.</p>
        </div>
      </div>

      <div class="interactive-node" style="margin-top: var(--fib-21);">
        <h4>Live Calculated Vectors Array Map</h4>
        <div style="display: flex; gap: var(--fib-8); align-items: flex-end; height: var(--pell-29); margin-top: var(--fib-21); background: var(--bg-dark-absolute); padding: var(--fib-13); border-radius: var(--fib-5);">
          <div class="graph-fill" data-gauge="20%" style="width: 12.5%; height: 0%;" id="bar-1"></div>
          <div class="graph-fill" data-gauge="40%" style="width: 12.5%; height: 0%;" id="bar-2"></div>
          <div class="graph-fill" data-gauge="85%" style="width: 12.5%; height: 0%;" id="bar-3"></div>
          <div class="graph-fill" data-gauge="50%" style="width: 12.5%; height: 0%;" id="bar-4"></div>
          <div class="graph-fill" data-gauge="95%" style="width: 12.5%; height: 0%;" id="bar-5"></div>
          <div class="graph-fill" data-gauge="30%" style="width: 12.5%; height: 0%;" id="bar-6"></div>
          <div class="graph-fill" data-gauge="70%" style="width: 12.5%; height: 0%;" id="bar-7"></div>
          <div class="graph-fill" data-gauge="60%" style="width: 12.5%; height: 0%;" id="bar-8"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="view-motion">
    <div class="stage-wrapper">
      <h2>Lucas Sequence Micro-Interaction Matrices</h2>
      <p style="margin-top: var(--fib-8); font-size: var(--pad-sm);">Testing visual flow and rendering thread prioritization parameters.</p>
      
      <div class="matrix-bento-grid" id="motion-cascade-matrix" style="margin-top: var(--fib-34);">
        </div>
    </div>
  </template>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const target = document.getElementById('router-target');
      const lifecycleLogger = document.getElementById('hud-lifecycle-log');
      let activeViewInstance = null;

      // Real-Time Frame Rate Meter Analytics Engine
      let frameCount = 0, lastCheckTime = performance.now(), currentFps = 60;
      function executeFpsMeterLoop() {
        frameCount++;
        const now = performance.now();
        if (now >= lastCheckTime + 1000) {
          currentFps = Math.round((frameCount * 1000) / (now - lastCheckTime));
          document.getElementById('fps-display').innerText = `${currentFps} FPS`;
          frameCount = 0;
          lastCheckTime = now;
        }
        requestAnimationFrame(executeFpsMeterLoop);
      }
      requestAnimationFrame(executeFpsMeterLoop);

      // System Dynamic Scalar Transformation Pipeline
      const scalarInput = document.getElementById('scalar-engine');
      const scalarValueDisplay = document.getElementById('scalar-value');
      scalarInput.addEventListener('input', (e) => {
        const value = e.target.value;
        document.documentElement.style.setProperty('--math-scalar', value);
        scalarValueDisplay.innerText = `${parseFloat(value).toFixed(1)}x`;
      });

      // View Controller Matrix Initialization Hooks
      const viewHooks = {
        blueprint: {
          onMount: (container) => {
            container.querySelectorAll('.graph-fill').forEach(fill => {
              requestAnimationFrame(() => fill.style.width = fill.getAttribute('data-gauge'));
            });
          },
          onUnmount: () => {}
        },
        analytics: {
          onMount: (container) => {
            container.querySelectorAll('.graph-fill').forEach(fill => {
              requestAnimationFrame(() => fill.style.height = fill.getAttribute('data-gauge'));
            });
          },
          onUnmount: () => {}
        },
        motion: {
          onMount: (container) => {
            const grid = container.querySelector('#motion-cascade-matrix');
            // Hard structural Lucas metrics sequence values array
            const lucasDelays = ['--lucas-ms-2', '--lucas-ms-4', '--lucas-ms-7', '--lucas-ms-11', '--lucas-ms-18', '--lucas-ms-29'];
            
            for(let i = 0; i < 6; i++) {
              const element = document.createElement('div');
              element.className = 'interactive-node';
              element.style.opacity = '0';
              element.style.transform = 'scale(0.95)';
              element.style.transition = `all var(--lucas-ms-47) ease`;
              element.style.transitionDelay = `var(${lucasDelays[i]})`;
              element.innerHTML = `<h4>Cascade Step 0${i+1}</h4><p style="font-size:var(--pad-sm); margin-top:var(--fib-8)">Delay Target Bind: ${lucasDelays[i]}</p>`;
              grid.appendChild(element);
              
              requestAnimationFrame(() => {
                element.style.opacity = '1';
                element.style.transform = 'scale(1)';
              });
            }
          },
          onUnmount: () => {}
        }
      };

      // Production Grade Routing Engine Configuration
      async function routerEngine() {
        const startTime = performance.now();
        const rawHash = window.location.hash.replace('#', '');
        const currentRoute = rawHash || 'blueprint';

        // Execute safety unmount cleanup processes if required
        if (activeViewInstance && viewHooks[activeViewInstance]?.onUnmount) {
          viewHooks[activeViewInstance].onUnmount();
        }

        // Active state navigation menu update loop
        document.querySelectorAll('.nav-stack li').forEach(item => {
          if(item.getAttribute('data-route') === currentRoute) {
            item.classList.add('active-route');
          } else {
            item.classList.remove('active-route');
          }
        });

        // Set layout loader simulation feedback state
        target.innerHTML = '<div class="matrix-spinner"></div>';

        // Async simulation delay using Lucas 290ms parameters
        await new Promise(resolve => setTimeout(resolve, 290));

        const viewTemplate = document.getElementById(`view-${currentRoute}`);
        if (!viewTemplate) {
          target.innerHTML = `<div style="padding:var(--fib-34); color:red;">Router Fault: View Archetype Target Not Found [${currentRoute}]</div>`;
          return;
        }

        const viewContent = viewTemplate.content.cloneNode(true);
        target.innerHTML = '';
        target.appendChild(viewContent);

        const mountedWrapper = target.querySelector('.stage-wrapper');
        activeViewInstance = currentRoute;

        // Fire lifecycle allocation maps
        if (viewHooks[currentRoute]?.onMount) {
          viewHooks[currentRoute].onMount(mountedWrapper);
        }

        requestAnimationFrame(() => {
          if(mountedWrapper) mountedWrapper.classList.add('mounted');
          const endTime = performance.now();
          lifecycleLogger.innerHTML = `ROUTE: /${currentRoute}<br>MOUNT TIME: ${parseFloat(endTime - startTime).toFixed(2)}ms`;
        });
      }

      window.addEventListener('hashchange', routerEngine);
      // Bootstrapping initialization sequence execution
      routerEngine();
    });
  </script>
</body>
</html>
