<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0math v2 — Multi-Sequence Design System Lab</title>
  <style>
    /* ==========================================================================
       THE FIVE SEQUENCES — CORE SYSTEM VARIABLES
       ========================================================================== */
    :root {
      /* Layer 1 — Fibonacci: Micro-Spacing */
      --fib-1: 1px;   --fib-2: 2px;   --fib-3: 3px;   --fib-5: 5px;
      --fib-8: 8px;   --fib-13: 13px; --fib-21: 21px; --fib-34: 34px;
      --fib-55: 55px; --fib-89: 89px; --fib-144: 144px; --fib-233: 233px;

      /* Layer 2 — Lucas: Animation Timing (seconds based on system numbers) */
      --lucas-delay-1: 0.02s;
      --lucas-delay-2: 0.01s; /* Shortest/Snappiest */
      --lucas-delay-3: 0.03s;
      --lucas-delay-4: 0.04s;
      --lucas-delay-7: 0.07s;
      --lucas-delay-11: 0.11s; /* GSAP/Stagger sweet spot */
      --lucas-delay-18: 0.18s;
      --lucas-delay-29: 0.29s;
      --lucas-delay-47: 0.47s; /* Hero Entrance */
      --lucas-delay-76: 0.76s; /* Page Transition */

      /* Layer 3 — Tribonacci: Component Sizing */
      --trib-1: 1px;    --trib-2: 2px;    --trib-4: 4px;    --trib-7: 7px;
      --trib-13: 13px;  --trib-24: 24px;  --trib-44: 44px;  --trib-81: 81px;
      --trib-149: 149px; --trib-274: 274px;

      /* Layer 4 — Padovan: Typography Scale */
      --pad-xs: 9px;   --pad-sm: 12px;  --pad-base: 16px; --pad-md: 21px;
      --pad-lg: 28px;  --pad-xl: 37px;  --pad-2xl: 49px;  --pad-3xl: 65px;

      /* Padovan Letter Spacing */
      --ls-tight: -0.02em; --ls-normal: 0em; --ls-wide: 0.04em;
      --ls-wider: 0.07em;  --ls-widest: 0.12em;

      /* Layer 5 — Pell: Macro Layout / Viewport Scales */
      --pell-5: 5vh;    --pell-12: 12vh;   --pell-29: 29vh;
      --pell-70: 70vh;  --pell-100: 100vh;
      --pell-px-12: 12px;   --pell-px-29: 29px;   --pell-px-70: 70px;
      --pell-px-169: 169px; --pell-px-408: 408px;

      /* Lab Dark Theme Palette */
      --color-bg: #09090b;
      --color-surface: #141419;
      --color-surface-elevated: #1d1d26;
      --color-border: #272730;
      --color-primary: #6366f1;
      --color-accent: #10b981;
      --color-text: #f4f4f7;
      --color-muted: #a1a1aa;
    }

    /* ==========================================================================
       BASE RESET & TYPOGRAPHY RULES (PADOVAN MAPPED)
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: var(--pad-base);
      letter-spacing: var(--ls-normal);
      line-height: 1.6;
      overflow-x: hidden;
      display: flex;
      min-height: var(--pell-100);
    }

    h1 { font-size: var(--pad-3xl); letter-spacing: var(--ls-tight); line-height: 1.1; }
    h2 { font-size: var(--pad-2xl); letter-spacing: var(--ls-tight); line-height: 1.2; }
    h3 { font-size: var(--pad-xl);  letter-spacing: var(--ls-normal); line-height: 1.3; }
    h4 { font-size: var(--pad-lg);  letter-spacing: var(--ls-wide); }
    
    .label-eyebrow { 
      font-size: var(--pad-sm); 
      letter-spacing: var(--ls-wider); 
      text-transform: uppercase; 
      color: var(--color-primary);
    }
    .caption { font-size: var(--pad-xs); color: var(--color-muted); letter-spacing: var(--ls-widest); }

    /* ==========================================================================
       APP SHELL LAYOUT (PELL STRUCTURED)
       ========================================================================== */
    #sidebar {
      width: var(--pell-px-169);
      background-color: var(--color-surface);
      border-right: var(--fib-1) solid var(--color-border);
      display: flex;
      flex-direction: column;
      padding: var(--fib-34) var(--fib-21);
      position: fixed;
      height: var(--pell-100);
      z-index: 100;
    }

    .logo {
      font-size: var(--pad-md);
      font-weight: 800;
      letter-spacing: var(--ls-tight);
      margin-bottom: var(--fib-55);
      display: flex;
      align-items: center;
      gap: var(--fib-8);
    }

    .logo span {
      color: var(--color-primary);
    }

    .nav-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--fib-13);
    }

    .nav-item button {
      background: none;
      border: none;
      color: var(--color-muted);
      font-size: var(--pad-sm);
      letter-spacing: var(--ls-wide);
      text-align: left;
      width: 100%;
      padding: var(--fib-8) var(--fib-13);
      border-radius: var(--fib-5);
      cursor: pointer;
      transition: all var(--lucas-delay-18) cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-item button:hover, .nav-item.active button {
      color: var(--color-text);
      background-color: var(--color-surface-elevated);
      padding-left: var(--fib-21);
    }

    .nav-item.active button {
      border-left: var(--fib-3) solid var(--color-primary);
    }

    #main-content {
      margin-left: var(--pell-px-169);
      flex-grow: 1;
      min-height: var(--pell-100);
      position: relative;
    }

    /* Modular Views Box-In Animation */
    .view-container {
      padding: var(--fib-55);
      opacity: 0;
      transform: translateY(var(--fib-21));
      transition: opacity var(--lucas-delay-47) ease, transform var(--lucas-delay-47) cubic-bezier(0.16, 1, 0.3, 1);
    }

    .view-container.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* ==========================================================================
       SHARED LAYOUT COMPONENTS (FIBONACCI & TRIBONACCI COMPLIANT)
       ========================================================================== */
    .grid-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(var(--trib-274), 1fr));
      gap: var(--fib-34);
      margin-top: var(--fib-34);
    }

    .math-card {
      background-color: var(--color-surface);
      border: var(--fib-1) solid var(--color-border);
      border-radius: var(--fib-8);
      padding: var(--fib-34);
      position: relative;
      overflow: hidden;
      transition: border-color var(--lucas-delay-29) ease;
    }

    .math-card:hover {
      border-color: var(--color-primary);
    }

    .math-icon {
      width: var(--trib-44);
      height: var(--trib-44);
      background-color: var(--color-surface-elevated);
      border-radius: var(--fib-5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--fib-21);
      color: var(--color-primary);
    }

    /* Modular Loader Spinner */
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--trib-44);
      height: var(--trib-44);
      border: var(--fib-3) solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin var(--lucas-delay-76) linear infinite;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>

  <aside id="sidebar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6H4zM14 4h6v6h-6zM4 4h6v6H4zM14 14h6v6h-6z"/></svg>
      0math<span>v2</span>
    </div>
    <ul class="nav-menu">
      <li class="nav-item active" data-page="blueprint"><button>System Blueprint</button></li>
      <li class="nav-item" data-page="analytics"><button>Data & Analytics</button></li>
      <li class="nav-item" data-page="motion"><button>Motion Matrix</button></li>
    </ul>
  </aside>

  <main id="main-content">
    <div id="app-viewport"></div>
  </main>

  <template id="page-blueprint">
    <div class="view-container">
      <style>
        .hero-section {
          min-height: var(--pell-29);
          display: flex;
          flex-direction: column;
          justify-content: center;
          margin-bottom: var(--fib-55);
          border-bottom: var(--fib-1) solid var(--color-border);
          padding-bottom: var(--fib-55);
        }
        .hero-section h1 { margin-top: var(--fib-13); margin-bottom: var(--fib-21); }
        .hero-section p { max-width: 600px; color: var(--color-muted); font-size: var(--pad-md); }
        
        .sequence-bar {
          height: var(--fib-8);
          background: var(--color-border);
          border-radius: var(--fib-3);
          margin-top: var(--fib-13);
          position: relative;
          overflow: hidden;
        }
        .sequence-fill {
          height: 100%;
          background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
          width: 0%;
          transition: width var(--lucas-delay-76) ease-in-out;
        }
      </style>
      
      <section class="hero-section">
        <span class="label-eyebrow">Architecture Matrix</span>
        <h1>Every pixel is derived. No arbitrary values.</h1>
        <p>A multi-sequence mathematical framework mapped perfectly into native UI modules. Five layers of deterministic digital presentation.</p>
      </section>

      <div class="grid-dashboard">
        <div class="math-card">
          <div class="math-icon">Φ</div>
          <h4>Layer 1: Fibonacci</h4>
          <p class="caption" style="margin-bottom: var(--fib-13)">Micro-spacing & Layout Paddings</p>
          <p>Controls margins, gaps, radiuses, and structural intervals uniformly.</p>
          <div class="sequence-bar"><div class="sequence-fill" data-width="100%"></div></div>
        </div>
        <div class="math-card">
          <div class="math-icon">L</div>
          <h4>Layer 2: Lucas</h4>
          <p class="caption" style="margin-bottom: var(--fib-13)">Animation Timing Sequences</p>
          <p>Drives the duration and rhythmic multi-stagger states of elements smoothly.</p>
          <div class="sequence-bar"><div class="sequence-fill" data-width="85%"></div></div>
        </div>
        <div class="math-card">
          <div class="math-icon">T</div>
          <h4>Layer 3: Tribonacci</h4>
          <p class="caption" style="margin-bottom: var(--fib-13)">Component Target Bounds</p>
          <p>Governs safe touch-targets, card thresholds, and flex system bases.</p>
          <div class="sequence-bar"><div class="sequence-fill" data-width="60%"></div></div>
        </div>
      </div>
    </div>
  </template>

  <template id="page-analytics">
    <div class="view-container">
      <style>
        .analytics-header { margin-bottom: var(--fib-34); }
        .data-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(var(--trib-149), 1fr));
          gap: var(--fib-21);
        }
        .stat-block {
          background: var(--color-surface-elevated);
          padding: var(--fib-21);
          border-radius: var(--fib-5);
          border-left: var(--fib-3) solid var(--color-accent);
        }
        .stat-value {
          font-size: var(--pad-2xl);
          font-weight: bold;
          letter-spacing: var(--ls-tight);
          color: var(--color-text);
        }
        /* Custom pure CSS Vector Chart using system variables */
        .chart-box {
          height: var(--pell-29);
          border: var(--fib-1) solid var(--color-border);
          border-radius: var(--fib-8);
          margin-top: var(--fib-34);
          display: flex;
          align-items: flex-end;
          padding: var(--fib-21);
          gap: var(--fib-13);
          background: linear-gradient(180deg, transparent 90%, rgba(255,255,255,0.02) 90%);
          background-size: 100% var(--fib-34);
        }
        .chart-bar {
          flex-grow: 1;
          background: var(--color-primary);
          border-radius: var(--fib-3) var(--fib-3) 0 0;
          opacity: 0.8;
          transition: height var(--lucas-delay-47) ease;
          height: 0px;
        }
        .chart-bar:hover { opacity: 1; background: var(--color-accent); }
      </style>

      <div class="analytics-header">
        <span class="label-eyebrow">Deterministic Operations</span>
        <h2>Sequence Node Analytics</h2>
      </div>

      <div class="data-grid">
        <div class="stat-block">
          <p class="caption">Tribonacci Min-Width</p>
          <div class="stat-value">274px</div>
        </div>
        <div class="stat-block">
          <p class="caption">Pell Macro Bounds</p>
          <div class="stat-value">408px</div>
        </div>
        <div class="stat-block">
          <p class="caption">Padovan Base Size</p>
          <div class="stat-value">16px</div>
        </div>
      </div>

      <div class="chart-box">
        <div class="chart-bar" data-height="13%"></div>
        <div class="chart-bar" data-height="21%"></div>
        <div class="chart-bar" data-height="34%"></div>
        <div class="chart-bar" data-height="55%"></div>
        <div class="chart-bar" data-height="89%"></div>
        <div class="chart-bar" data-height="65%"></div>
        <div class="chart-bar" data-height="49%"></div>
        <div class="chart-bar" data-height="37%"></div>
      </div>
    </div>
  </template>

  <template id="page-motion">
    <div class="view-container">
      <style>
        .motion-intro { margin-bottom: var(--fib-34); }
        .stagger-container {
          display: flex;
          flex-direction: column;
          gap: var(--fib-13);
          max-width: var(--pell-px-408);
        }
        .stagger-row {
          background: var(--color-surface);
          border: var(--fib-1) solid var(--color-border);
          padding: var(--fib-13) var(--fib-21);
          border-radius: var(--fib-5);
          display: flex;
          justify-content: space-between;
          align-items: center;
          transform: translateX(-50px);
          opacity: 0;
          transition: transform var(--lucas-delay-47) cubic-bezier(0.16, 1, 0.3, 1), opacity var(--lucas-delay-47) ease;
        }
        .stagger-container.animate .stagger-row {
          transform: translateX(0);
          opacity: 1;
        }
        .trigger-btn {
          background: var(--color-primary);
          color: white;
          border: none;
          padding: var(--fib-13) var(--fib-21);
          border-radius: var(--fib-5);
          font-size: var(--pad-sm);
          letter-spacing: var(--ls-wide);
          cursor: pointer;
          margin-bottom: var(--fib-34);
          transition: background-color var(--lucas-delay-1) ease;
        }
        .trigger-btn:hover { background: #4f46e5; }
      </style>

      <div class="motion-intro">
        <span class="label-eyebrow">Lucas Layer Orchestration</span>
        <h2>Rhythmic Cascade Matrix</h2>
        <p class="caption" style="margin-top: var(--fib-5)">Stagger instances precisely decoupled using native sequence delays</p>
      </div>

      <button class="trigger-btn" id="retrigger-motion">Pulse Cascade Array</button>

      <div class="stagger-container" id="cascade-box">
        <div class="stagger-row" style="transition-delay: var(--lucas-delay-2);"><span>Step 1 (Lucas 1)</span><code>0.01s</code></div>
        <div class="stagger-row" style="transition-delay: var(--lucas-delay-1);"><span>Step 2 (Lucas 2)</span><code>0.02s</code></div>
        <div class="stagger-row" style="transition-delay: var(--lucas-delay-3);"><span>Step 3 (Lucas 3)</span><code>0.03s</code></div>
        <div class="stagger-row" style="transition-delay: var(--lucas-delay-4);"><span>Step 4 (Lucas 4)</span><code>0.04s</code></div>
        <div class="stagger-row" style="transition-delay: var(--lucas-delay-7);"><span>Step 5 (Lucas 7)</span><code>0.07s</code></div>
        <div class="stagger-row" style="transition-delay: var(--lucas-delay-11);"><span>Step 6 (Lucas 11)</span><code>0.11s</code></div>
        <div class="stagger-row" style="transition-delay: var(--lucas-delay-18);"><span>Step 7 (Lucas 18)</span><code>0.18s</code></div>
      </div>
    </div>
  </template>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      const viewport = document.getElementById('app-viewport');
      const navItems = document.querySelectorAll('.nav-item');

      // Setup Simulated Asynchronous Module Pipeline Loader
      async function loadViewModule(viewId) {
        // Render Modular System Loader State
        viewport.innerHTML = '<div class="loader"></div>';
        
        // Simulating fine network latency via discrete Lucas metrics
        await new Promise(resolve => setTimeout(resolve, 300));

        const template = document.getElementById(`page-${viewId}`);
        if (!template) {
          viewport.innerHTML = `<div>Module Exception: Error loading view '${viewId}'</div>`;
          return;
        }

        // Clone Node Module Data Fragment
        const instance = template.content.cloneNode(true);
        viewport.innerHTML = '';
        viewport.appendChild(instance);

        // Run post-render initialization hooks specific to individual view definitions
        requestAnimationFrame(() => {
          const viewContainer = viewport.querySelector('.view-container');
          if (viewContainer) {
            viewContainer.classList.add('active');
            initViewBehaviors(viewId, viewContainer);
          }
        });
      }

      // Initialize View Lifecycle Logic hooks natively
      function initViewBehaviors(viewId, container) {
        if (viewId === 'blueprint') {
          // Micro-fills for mathematical bar meters
          container.querySelectorAll('.sequence-fill').forEach(fill => {
            setTimeout(() => {
              fill.style.width = fill.getAttribute('data-width');
            }, 100);
          });
        } 
        else if (viewId === 'analytics') {
          // Fluid height animation calculations via custom arrays
          container.querySelectorAll('.chart-bar').forEach(bar => {
            setTimeout(() => {
              bar.style.height = bar.getAttribute('data-height');
            }, 150);
          });
        } 
        else if (viewId === 'motion') {
          const cascadeBox = container.querySelector('#cascade-box');
          const triggerBtn = container.querySelector('#retrigger-motion');
          
          setTimeout(() => cascadeBox.classList.add('animate'), 50);

          triggerBtn.addEventListener('click', () => {
            cascadeBox.classList.remove('animate');
            // Force Layout Recalculation to cleanly interrupt state
            void cascadeBox.offsetWidth; 
            cascadeBox.classList.add('animate');
          });
        }
      }

      // App Shell Navigation Listener Framework
      navItems.forEach(item => {
        item.addEventListener('click', (e) => {
          const activeItem = document.querySelector('.nav-item.active');
          if (activeItem === item) return;

          activeItem.classList.remove('active');
          item.classList.add('active');

          const targetPage = item.getAttribute('data-page');
          loadViewModule(targetPage);
        });
      });

      // Initial system bootstrapping execution state 
      loadViewModule('blueprint');
    });
  </script>
</body>
</html>
